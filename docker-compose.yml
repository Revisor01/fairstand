services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fairstand
      POSTGRES_USER: fairstand
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairstand"]
      interval: 5s
      timeout: 5s
      retries: 10
      # Max Wartezeit: 10 Versuche × 5s = 50s bis PostgreSQL als healthy gilt

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fairstand.rule=Host(`fairstand.godsapp.de`)"
      - "traefik.http.services.fairstand.loadbalancer.server.port=80"
    networks:
      - traefik
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - sqlite-data:/app/data
    environment:
      - PORT=3000
      - CORS_ORIGIN=https://fairstand.godsapp.de
      - TZ=Europe/Berlin
      - DATABASE_URL=postgresql://fairstand:${POSTGRES_PASSWORD}@postgres:5432/fairstand
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-Fairstand <noreply@fairstand.godsapp.de>}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fairstand-api.rule=Host(`fairstand.godsapp.de`) && PathPrefix(`/api`)"
      - "traefik.http.routers.fairstand-api.priority=100"
      - "traefik.http.services.fairstand-api.loadbalancer.server.port=3000"
    networks:
      - traefik
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sqlite-data:
  postgres-data:

networks:
  traefik:
    external: true
