services:
  client:
    image: ghcr.io/revisor01/fairstand/client:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fairstand.rule=Host(`fairstand.godsapp.de`)"
      - "traefik.http.services.fairstand.loadbalancer.server.port=80"
    networks:
      - traefik
    restart: unless-stopped

  server:
    image: ghcr.io/revisor01/fairstand/server:latest
    volumes:
      - sqlite-data:/app/data
    environment:
      - PORT=3000
      - CORS_ORIGIN=https://fairstand.godsapp.de
      - TZ=Europe/Berlin
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-Fairstand <noreply@fairstand.godsapp.de>}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fairstand-api.rule=Host(`fairstand.godsapp.de`) && PathPrefix(`/api`)"
      - "traefik.http.services.fairstand-api.loadbalancer.server.port=3000"
    networks:
      - traefik
    restart: unless-stopped

volumes:
  sqlite-data:

networks:
  traefik:
    external: true
